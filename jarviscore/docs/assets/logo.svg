<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 60 80" fill="none">
  <!--
    JarvisCore logomark.
    Ellipse centre ~(28, 38), rx=19, ry=25.
    Arc start  (39, 18) ≈ angle -55°
    Arc end    (42, 55) ≈ angle +42°
    Span: 263° CCW — avoids symmetric-endpoint ambiguity that caused the
    short-arc rendering bug (same-x start/end collapses in most browsers).
  -->

  <!-- ~263° oval arc, CCW, gap at lower-right -->
  <path
    d="M 39 18 A 19 25 0 1 0 42 55"
    stroke="#39FF14"
    stroke-width="6.5"
    stroke-linecap="round"
    fill="none"
  />

  <!-- J: upper-right → diagonal through oval centre → hooks right at bottom -->
  <path
    d="M 39 18 C 32 30 14 50 12 62 C 10 74 24 78 40 72"
    stroke="#39FF14"
    stroke-width="6.5"
    stroke-linecap="round"
    fill="none"
  />
</svg>
