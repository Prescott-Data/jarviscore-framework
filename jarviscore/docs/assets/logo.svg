<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 96" fill="none">
  <!--
    JarvisCore logomark — ∅-style: bold oval ring with diagonal J stroke.

    Ellipse centre (40, 46), rx=26, ry=30.
    Gap at upper-right, roughly 1 o'clock (53,20) to 3 o'clock (66,46) — ~90°.
    Arc goes CCW (sweep=0) the long way: over top, down left, across bottom,
    up right — ~270° of ring, matching the physical stencil.

    Diagonal J: enters at top of gap (53,20), runs straight through the oval
    centre (40,46), exits lower-left, then hooks gently right at the bottom —
    like the ø slash extended into a soft J tail.
  -->

  <!-- Oval ring: ~270° CCW, gap at upper-right -->
  <path
    d="M 53 20 A 26 30 0 1 0 66 46"
    stroke="#39FF14"
    stroke-width="9"
    stroke-linecap="round"
    fill="none"
  />

  <!-- J diagonal: upper-right → through oval centre → soft hook right at bottom -->
  <path
    d="M 53 20 C 46 36 28 58 22 72 C 18 84 26 90 40 86"
    stroke="#39FF14"
    stroke-width="9"
    stroke-linecap="round"
    fill="none"
  />
</svg>
