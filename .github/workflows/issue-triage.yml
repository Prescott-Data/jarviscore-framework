name: Issue Triage

on:
  issues:
    types: [opened]

permissions:
  issues: write
  contents: read

jobs:
  triage:
    runs-on: ubuntu-latest
    steps:
      - name: Label by title keywords
        uses: actions/github-script@v7
        with:
          script: |
            const title = context.payload.issue.title.toLowerCase();
            const body  = (context.payload.issue.body || '').toLowerCase();
            const text  = title + ' ' + body;

            const labels = [];
            if (/fail|error|crash|broken|ssl|null|exception|traceback|not work/.test(text))
              labels.push('bug');
            if (/add|support|feature|enhance|implement|missing|request|proposal/.test(text))
              labels.push('enhancement');
            if (/how|what|why|question|help|clarif|understand/.test(text))
              labels.push('question');

            if (labels.length) {
              try {
                await github.rest.issues.addLabels({
                  ...context.repo,
                  issue_number: context.issue.number,
                  labels,
                });
              } catch (e) {
                // Labels may not exist yet — create them first then retry
                for (const label of labels) {
                  try {
                    await github.rest.issues.createLabel({
                      ...context.repo,
                      name: label,
                      color: label === 'bug' ? 'd73a4a'
                           : label === 'enhancement' ? 'a2eeef'
                           : '0075ca',
                    });
                  } catch (_) { /* already exists */ }
                }
                await github.rest.issues.addLabels({
                  ...context.repo,
                  issue_number: context.issue.number,
                  labels,
                });
              }
            }

      - name: Assign and post triage comment
        uses: actions/github-script@v7
        with:
          script: |
            // Auto-assign to maintainer
            try {
              await github.rest.issues.addAssignees({
                ...context.repo,
                issue_number: context.issue.number,
                assignees: ['Ruth-mutua'],
              });
            } catch (e) {
              core.warning('Could not assign: ' + e.message);
            }

            const title = context.payload.issue.title;
            const isBot = context.payload.issue.user.type === 'Bot';
            if (isBot) return;   // skip bot-generated issues

            await github.rest.issues.createComment({
              ...context.repo,
              issue_number: context.issue.number,
              body: [
                `Thanks for opening this issue, @${context.payload.issue.user.login}!`,
                '',
                '**Triage checklist** (for maintainer @Ruth-mutua)',
                '- [ ] Reproduce in isolation',
                '- [ ] Identify the affected component',
                '- [ ] Assign to a milestone / target release',
                '- [ ] Link any related issues or PRs',
                '',
                '> _This comment was posted automatically. ' +
                'You will receive an email when a maintainer responds._',
              ].join('\n'),
            });
