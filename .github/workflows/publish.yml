name: Publish to PyPI

on:
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        type: choice
        options:
          - testpypi
          - pypi
      dry_run:
        description: "Dry run — build and verify only, skip upload"
        required: false
        type: boolean
        default: false

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Clean previous builds
        run: rm -rf dist/ build/ *.egg-info jarviscore.egg-info

      - name: Build wheel and sdist
        run: python -m build

      - name: Verify distributions
        run: twine check dist/*

      - name: Show build artifacts
        run: ls -lh dist/

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 7

  publish:
    name: Publish to ${{ inputs.target }}
    needs: build
    if: ${{ !inputs.dry_run }}
    runs-on: ubuntu-latest

    environment:
      name: ${{ inputs.target }}
      url: ${{ inputs.target == 'pypi' && 'https://pypi.org/p/jarviscore-framework' || 'https://test.pypi.org/p/jarviscore-framework' }}

    permissions:
      id-token: write  # required for OIDC trusted publishing — no API token needed

    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to ${{ inputs.target }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: ${{ inputs.target == 'testpypi' && 'https://test.pypi.org/legacy/' || '' }}
