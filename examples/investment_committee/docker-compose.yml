services:

  redis:
    image: redis:7-alpine
    container_name: committee-redis
    restart: always
    ports:
      - "6380:6379"          # host 6380 avoids clash with any existing Redis
    volumes:
      - committee_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  dashboard:
    build: .
    container_name: investment-committee
    restart: always
    ports:
      - "8004:8004"
    env_file:
      - .env
    environment:
      REDIS_URL: redis://redis:6379/0
    volumes:
      - committee_memos:/app/data/memos
      - committee_blob:/app/blob_storage
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8004/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  committee_redis_data:
    name: committee-redis-data
  committee_memos:
    name: committee-memos
  committee_blob:
    name: committee-blob-storage
