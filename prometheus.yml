global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: jarviscore
    static_configs:
      - targets:
          - host.docker.internal:9090   # Example 1, 3, 4 (single-node)
          - host.docker.internal:9091   # Example 2 node 1
          - host.docker.internal:9092   # Example 2 node 2
          - host.docker.internal:9093   # Example 2 node 3
          - host.docker.internal:9094   # Example 2 synthesizer
    metrics_path: /metrics
